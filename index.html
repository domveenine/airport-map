:root {
  --bg: #f7f8fb;
  --card: rgba(255,255,255,0.96);
  --text: #172033;
  --muted: #5f6b7a;
  --pin: #1e4ed8;
  --pin-border: #ffffff;
  --hit: #ffbf00;
  --shadow: 0 14px 40px rgba(20, 35, 65, 0.18);
  --radius: 18px;
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background: var(--bg);
}

#map {
  height: 100vh;
  width: 100vw;
  background: #dfe8ef;
}

.panel {
  position: absolute;
  z-index: 1001;
  top: 18px;
  right: 18px;
  width: min(420px, calc(100vw - 36px));
  background: var(--card);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
}

.panel h1 {
  margin: 0 0 4px;
  font-size: 1.15rem;
  line-height: 1.2;
  letter-spacing: -0.02em;
}

.panel p {
  margin: 0 0 14px;
  color: var(--muted);
  font-size: 0.88rem;
  line-height: 1.35;
}

.search-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 8px;
  align-items: center;
}

#search {
  width: 100%;
  border: 1px solid rgba(15, 23, 42, 0.15);
  border-radius: 12px;
  padding: 11px 12px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 160ms ease, box-shadow 160ms ease;
  background: white;
}

#search:focus {
  border-color: #4776e6;
  box-shadow: 0 0 0 4px rgba(71, 118, 230, 0.14);
}

button {
  border: 0;
  border-radius: 12px;
  padding: 11px 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 160ms ease, filter 160ms ease, background 160ms ease;
  white-space: nowrap;
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(0.98);
}

#searchBtn {
  color: white;
  background: #172033;
}

#clearBtn {
  color: #172033;
  background: #edf1f7;
}

#status {
  margin-top: 12px;
  font-size: 0.84rem;
  color: var(--muted);
  min-height: 20px;
  line-height: 1.35;
}

.match-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  max-height: 82px;
  overflow: auto;
}

.match-chip {
  border: 1px solid rgba(15, 23, 42, 0.1);
  background: #fff;
  border-radius: 999px;
  padding: 6px 8px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 150ms ease, transform 150ms ease;
}

.match-chip:hover {
  background: #f2f6ff;
  transform: translateY(-1px);
}

.legend {
  position: absolute;
  z-index: 1001;
  left: 18px;
  bottom: 18px;
  background: var(--card);
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 12px 14px;
  color: var(--muted);
  font-size: 0.8rem;
}

.airport-pin {
  width: 36px;
  height: 36px;
  border-radius: 999px 999px 999px 4px;
  background: var(--pin);
  color: white;
  border: 3px solid var(--pin-border);
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 0.68rem;
  letter-spacing: 0.02em;
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.24);
  transform: rotate(-45deg);
  transition: transform 220ms ease, background 220ms ease, box-shadow 220ms ease, filter 220ms ease;
  will-change: transform;
  user-select: none;
}

.airport-pin span {
  transform: rotate(45deg);
  display: block;
}

.leaflet-marker-icon:hover .airport-pin {
  transform: rotate(-45deg) scale(1.17);
  filter: saturate(1.15);
  box-shadow: 0 12px 24px rgba(15, 23, 42, 0.32);
}

.airport-pin.is-base {
  border-color: #d62828;
  border-width: 4px;
}

.airport-pin.is-hit.is-base {
  border-color: #d62828;
}

.airport-pin.is-hit {
  background: var(--hit);
  color: #172033;
  border-color: #fff6cc;
  box-shadow: 0 0 0 8px rgba(255, 191, 0, 0.18), 0 14px 28px rgba(15, 23, 42, 0.30);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: rotate(-45deg) scale(1.14); }
  50% { transform: rotate(-45deg) scale(1.30); }
}

.time-tooltip {
  border: 0 !important;
  border-radius: 14px !important;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.20) !important;
  padding: 0 !important;
  background: transparent !important;
}

.time-tooltip::before { display: none; }

.tooltip-card {
  min-width: 205px;
  padding: 12px 13px;
  background: white;
  border-radius: 14px;
  border: 1px solid rgba(15, 23, 42, 0.08);
  color: #172033;
}

.tooltip-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}

.tooltip-code {
  font-weight: 900;
  letter-spacing: 0.05em;
  font-size: 0.86rem;
}

.tooltip-city {
  font-size: 0.83rem;
  color: var(--muted);
  line-height: 1.25;
}

.tooltip-airport {
  margin-top: 7px;
  padding-top: 7px;
  border-top: 1px solid rgba(15, 23, 42, 0.08);
  font-size: 0.86rem;
  font-weight: 750;
  line-height: 1.25;
}

.tooltip-time {
  font-size: 1.12rem;
  font-weight: 850;
  letter-spacing: -0.01em;
  margin-top: 4px;
}

.tooltip-date {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 2px;
}

.timezone-label {
  font-size: 0.72rem;
  color: var(--muted);
  background: #f3f5f8;
  border-radius: 999px;
  padding: 4px 7px;
  white-space: nowrap;
}

.error-card {
  position: absolute;
  inset: 18px;
  display: none;
  place-items: center;
  z-index: 2000;
  pointer-events: none;
}

.error-card div {
  max-width: 520px;
  background: #fff;
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 20px;
  border: 1px solid rgba(15, 23, 42, 0.08);
}

.leaflet-control-attribution { font-size: 10px; }

@media (max-width: 720px) {
  .panel {
    top: 12px;
    right: 12px;
    left: 12px;
    width: calc(100vw - 24px);
    padding: 14px;
  }

  .search-row { grid-template-columns: 1fr; }

  .legend {
    left: 12px;
    right: auto;
    bottom: 20px;
    max-width: calc(100vw - 24px);
  }
}

  </style>
</head>

    <div id="matches" class="match-list" aria-live="polite"></div>

    function bootMap() {
      if (!window.L) {
        document.getElementById('errorCard').style.display = 'grid';
        return;

      const map = L.map('map', {
        zoomControl: true,
        scrollWheelZoom: true,
        worldCopyJump: false,
        preferCanvas: true
      }).setView([37.6, -96.5], 4);

      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        noWrap: true,
        updateWhenIdle: true,
        updateWhenZooming: false,
        keepBuffer: 3,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const markers = new Map();
      const swaBaseCodes = new Set(['ATL','BWI','MDW','DAL','DEN','HOU','LAS','LAX','BNA','OAK','MCO','PHX']);
      const fullMapBounds = airports.map(item => [item.lat, item.lon]);
      const formatterCache = new Map();
      const openTooltipCodes = new Set();
      let highlightedCodes = new Set();
      let searchDebounceTimer = null;

      function getFormatters(tz) {
        if (!formatterCache.has(tz)) {
          formatterCache.set(tz, {
            time: new Intl.DateTimeFormat([], {
              timeZone: tz,
              hour: 'numeric',
              minute: '2-digit',
              second: '2-digit',
              hour12: true
            }),
            date: new Intl.DateTimeFormat([], {
              timeZone: tz,
              weekday: 'short',
              month: 'short',
              day: 'numeric'
            }),
            zone: new Intl.DateTimeFormat([], {
              timeZone: tz,
              timeZoneName: 'short'
            })
          });
        }

        return formatterCache.get(tz);
      }

      function getTimeParts(item) {
        const now = new Date();
        const formatters = getFormatters(item.tz);
        let tzName = item.tz;

        try {
          const parts = formatters.zone.formatToParts(now);
          tzName = parts.find(part => part.type === 'timeZoneName')?.value || item.tz;
        } catch (error) {
          tzName = item.tz;
        }

        return {
          time: formatters.time.format(now),
          date: formatters.date.format(now),
          tzName
        };
      }

      function tooltipContent(item) {
        const { time, date, tzName } = getTimeParts(item);
        const coterminalText = coterminals[item.code]
          ? `<div class="tooltip-airport"><strong>CoTerminals:</strong> ${coterminals[item.code]}</div>`
          : "";

        return `
          <div class="tooltip-card">
            <div class="tooltip-top">
              <div>
                <div class="tooltip-code">${item.code}</div>
                <div class="tooltip-city">${item.city}</div>
                <div class="tooltip-airport">${item.airportName}</div>
              </div>
              <div class="timezone-label">${tzName}</div>
            </div>
            <div class="tooltip-time">${time}</div>
            <div class="tooltip-date">${date} · ${item.tz}</div>
            ${coterminalText}
          </div>
        `;
      }

      function makeIcon(item, isHit = false) {
        const classes = ['airport-pin'];
        if (swaBaseCodes.has(item.code)) classes.push('is-base');

        return L.divIcon({

        });

        if (matches.length > 12) {
          const extra = document.createElement('span');
          extra.className = 'match-chip';
          extra.textContent = `+${matches.length - 12} more`;
          container.appendChild(extra);
        }
      }

      function clearHighlights(clearInput = true, resetMap = false) {
        highlightedCodes.clear();
        openTooltipCodes.clear();
        markers.forEach(entry => entry.marker.closeTooltip());
        refreshMarkerIcons();

        if (clearInput) {
          document.getElementById('search').value = '';
          setStatus(`Showing ${airports.length} airports.`);
          document.getElementById('matches').innerHTML = '';
        }

        if (resetMap) {
          map.flyTo([41.3032, -95.8941], 4, {
            duration: 0.75,
            easeLinearity: 0.2
          });
        }
      }

      function refreshMarkerIcons() {
        markers.forEach((entry, code) => {
          entry.marker.setIcon(makeIcon(entry.item, highlightedCodes.has(code)));
        });
      }

      function focusItem(item) {
        highlightedCodes = new Set([item.code]);
        refreshMarkerIcons();

        const entry = markers.get(item.code);
        const targetZoom = Math.max(map.getZoom(), 7);

        map.flyTo([item.lat, item.lon], targetZoom, {
          duration: 0.7,
          easeLinearity: 0.2
        });

        map.once('moveend', () => {
          map.setView([item.lat, item.lon], map.getZoom(), { animate: false });
          openTooltipCodes.clear();
          openTooltipCodes.add(item.code);
          entry.marker.setTooltipContent(tooltipContent(item));
          entry.marker.openTooltip();
        });

        setStatus(`Highlighted ${item.code} · ${item.airportName}`);
        renderMatches([item]);
      }

      function runSearch({ focusFirst = true } = {}) {
        const query = normalize(document.getElementById('search').value);

        if (!query) {
          clearHighlights(false);
          setStatus(`Showing ${airports.length} airports.`);
          document.getElementById('matches').innerHTML = '';
          return;
        }

        const exactCodeMatches = airports.filter(item => normalize(item.code) === query);
        const matches = exactCodeMatches.length
          ? exactCodeMatches
          : airports.filter(item => item.searchable.includes(query));

        if (!matches.length) {
          highlightedCodes.clear();
          refreshMarkerIcons();
          setStatus(`No match found for “${document.getElementById('search').value}”.`);
          document.getElementById('matches').innerHTML = '';
          return;
        }

        highlightedCodes = new Set(matches.map(item => item.code));
        refreshMarkerIcons();
        renderMatches(matches);

        const label = matches.length === 1 ? 'match' : 'matches';
        setStatus(`${matches.length} ${label} found. Click a result to zoom in.`);

        if (focusFirst && matches.length === 1) {
          focusItem(matches[0]);
        } else if (focusFirst && exactCodeMatches.length === 1) {
          focusItem(matches[0]);
        } else if (focusFirst) {
          const bounds = matches.map(item => [item.lat, item.lon]);
          map.flyToBounds(bounds, { padding: [70, 70], duration: 0.65, maxZoom: 7 });
        }
      }

      addMarkers();

      document.getElementById('searchBtn').addEventListener('click', () => runSearch({ focusFirst: true }));
      document.getElementById('clearBtn').addEventListener('click', () => clearHighlights(true, true));

      document.getElementById('search').addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
          runSearch({ focusFirst: true });
        }

        if (event.key === 'Escape') {
          clearHighlights(true);
        }
      });

      document.getElementById('search').addEventListener('input', () => {
        window.clearTimeout(searchDebounceTimer);
        searchDebounceTimer = window.setTimeout(() => {
          runSearch({ focusFirst: false });
        }, 120);
      });

      setInterval(() => {
        openTooltipCodes.forEach(code => {
          const entry = markers.get(code);
          if (!entry || !entry.marker.isTooltipOpen()) {
            openTooltipCodes.delete(code);
            return;
          }

          entry.marker.setTooltipContent(tooltipContent(entry.item));
        });
      }, 1000);

      setTimeout(() => map.invalidateSize(), 250);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootMap);
    } else {
      bootMap();
    }
  </script>
</body>
</html>
